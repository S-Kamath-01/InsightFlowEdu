<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Cream/beige background -->
  <rect width="500" height="500" fill="#f5f1e8"/>
  
  <!-- Head silhouette with analytics (steel blue) -->
  <g transform="translate(80, 150)">
    <!-- Head outline -->
    <path d="M 50 80 Q 50 20 90 10 Q 130 20 130 80 Q 130 140 110 160 L 110 180 L 70 180 L 70 160 Q 50 140 50 80 Z" 
          fill="#4a7c9e" stroke="none"/>
    
    <!-- Bar chart inside head -->
    <rect x="70" y="100" width="12" height="35" fill="#2d4a5e"/>
    <rect x="85" y="85" width="12" height="50" fill="#2d4a5e"/>
    <rect x="100" y="95" width="12" height="40" fill="#2d4a5e"/>
    <rect x="115" y="75" width="12" height="60" fill="#2d4a5e"/>
    
    <!-- Trend line overlay (orange) -->
    <polyline points="76,115 91,100 106,110 121,90" 
              fill="none" stroke="#e67e3c" stroke-width="3.5" stroke-linecap="round"/>
    
    <!-- Data points on trend line -->
    <circle cx="76" cy="115" r="5" fill="#e67e3c"/>
    <circle cx="91" cy="100" r="5" fill="#e67e3c"/>
    <circle cx="106" cy="110" r="5" fill="#e67e3c"/>
    <circle cx="121" cy="90" r="5" fill="#e67e3c"/>
  </g>
  
  <!-- Text: "Insight Flow" -->
  <text x="240" y="215" font-family="Arial, sans-serif" font-size="72" font-weight="700" fill="#1e3a4a">Insight</text>
  <text x="240" y="295" font-family="Arial, sans-serif" font-size="72" font-weight="700" fill="#1e3a4a">Flow</text>
  
  <!-- Text: "EDU" -->
  <text x="240" y="355" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#1e3a4a" letter-spacing="8">EDU</text>
</svg>
